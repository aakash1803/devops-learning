name: CI - Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker backend images
        uses: docker/build-push-action@v2
        with:
          context: ./learn-devops-backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/learn-devops-backend:latest
      - name: Build and push Docker frontend images
        uses: docker/build-push-action@v2
        with:
          context: ./learn-devops-frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/learn-devops-frontend:latest

      
      
       